# Generovanie Xcode projektu: brew install xcodegen && xcodegen
name: HeadentClient
options:
  bundleIdPrefix: sk.tvhclient
  deploymentTarget:
    iOS: "15.0"
packages:
  MobileVLCKit:
    url: https://github.com/tylerjonesio/vlckit-spm
    minVersion: "3.6.0"
    maxVersion: "4.0.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  HeadentClient:
    type: application
    platform: iOS
    sources:
      - HeadentClient
    dependencies:
      - package: MobileVLCKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sk.tvhclient.ios
        OTHER_LDFLAGS: $(inherited) -framework Shared
        FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    info:
      path: HeadentClient/Info.plist
      properties:
        CFBundleDisplayName: Headent Client
        UILaunchScreen: {}
        # TVH bezi typicky na HTTP bez TLS - povolime cleartext
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    preBuildScripts:
      - name: Build Shared KMP Framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
